name: Sync Spotify to YT Music
on:
  schedule:
    - cron: '0 * * * *' # Gira ogni ora
  workflow_dispatch: # Avvio manuale

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tool
        run: pip install spotify2ytmusic

      - name: Sync Liked Songs
        run: |
          # 1. Setup Spotify
          python3 -m spotify2ytmusic.cli setup --id "${{ secrets.SPOTIFY_CLIENT_ID }}" --secret "${{ secrets.SPOTIFY_CLIENT_SECRET }}"
          
          # 2. Creazione file cookie (usiamo il formato corretto per questa libreria)
          echo '${{ secrets.YT_COOKIE }}' > headers.json
          
          # 3. Test di connessione: proviamo a vedere se lo script "vede" le playlist
          echo "Verifica playlist in corso..."
          python3 -m spotify2ytmusic.cli playlists
