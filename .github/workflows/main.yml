name: Sync Spotify to YT Music
on:
  schedule:
    - cron: '0 * * * *' # Gira ogni ora
  workflow_dispatch: # Avvio manuale

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tool
        run: pip install spotify2ytmusic

      - name: Sync Liked Songs
        run: |
          # 1. Setup Spotify
          python3 -m spotify2ytmusic.cli setup --id "${{ secrets.SPOTIFY_CLIENT_ID }}" --secret "${{ secrets.SPOTIFY_CLIENT_SECRET }}"
          
          # 2. Creazione file cookie (fondamentale che sia headers.json)
          echo '${{ secrets.YT_COOKIE }}' > headers.json
          
          # 3. TEST: Chiediamo allo script di ELENCARE le tue playlist di Spotify
          echo "Verifica connessione Spotify..."
          python3 -m spotify2ytmusic.cli list
          
          # 4. TEST: Chiediamo allo script di mostrare i primi brani dei 'Mi piace'
          echo "Verifica accesso YouTube Music..."
          python3 -m spotify2ytmusic.cli liked
