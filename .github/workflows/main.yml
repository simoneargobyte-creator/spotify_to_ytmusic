name: Sync Spotify to YT Music
on:
  schedule:
    - cron: '0 * * * *' # Gira ogni notte alle 02:00
  workflow_dispatch: # Ti permette di avviarlo a mano quando vuoi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install spotify-to-ytmusic

      - name: Run sync
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          YT_COOKIE: ${{ secrets.YT_COOKIE }}
        run: |
          # 1. Creiamo il file delle impostazioni (settings.ini) al volo
          printf "[spotify]\nclient_id=$SPOTIFY_CLIENT_ID\nclient_secret=$SPOTIFY_CLIENT_SECRET\n\n[youtube]\nheaders_raw=$YT_COOKIE" > settings.ini
          
          # 2. Eseguiamo la sincronizzazione usando l'eseguibile installato
          spotify_to_ytmusic sync all
