name: Sync Spotify to YT Music
on:
  schedule:
    - cron: '0 * * * *' # Gira ogni notte alle 02:00
  workflow_dispatch: # Ti permette di avviarlo a mano quando vuoi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install spotify-to-ytmusic

      - name: Run sync
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          YT_COOKIE: ${{ secrets.YT_COOKIE }}
        run: |
          # 1. Creiamo il file settings.ini
          cat <<EOF > settings.ini
          [spotify]
          client_id = $SPOTIFY_CLIENT_ID
          client_secret = $SPOTIFY_CLIENT_SECRET

          [youtube]
          headers_raw = $YT_COOKIE
          EOF
          
          # 2. Aggiungiamo la cartella degli script al PATH e lanciamo il comando
          export PATH=$PATH:/home/runner/.local/bin
          spotify_to_ytmusic all
