name: Sync Spotify to YT Music
on:
  schedule:
    - cron: '0 * * * *' # Gira ogni notte alle 02:00
  workflow_dispatch: # Ti permette di avviarlo a mano quando vuoi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install spotify-to-ytmusic

      - name: Run sync
        run: |
          # 1. Troviamo dove è installata la libreria
          LIB_PATH=$(python -c "import spotify_to_ytmusic; import os; print(os.path.dirname(spotify_to_ytmusic.__file__))")
          
          # 2. Creiamo il file settings.ini ESATTAMENTE dove lo script lo vuole (come visto dall'errore)
          cat <<EOF > "$LIB_PATH/settings.ini"
          [spotify]
          client_id = ${{ secrets.SPOTIFY_CLIENT_ID }}
          client_secret = ${{ secrets.SPOTIFY_CLIENT_SECRET }}

          [youtube]
          headers_raw = ${{ secrets.YT_COOKIE }}
          EOF
          
          # 3. Lanciamo la sincronizzazione
          export PATH=$PATH:/home/runner/.local/bin
          spotify_to_ytmusic all me
