name: Sync Spotify to YT Music
on:
  schedule:
    - cron: '0 * * * *' # Gira ogni notte alle 02:00
  workflow_dispatch: # Ti permette di avviarlo a mano quando vuoi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install spotify-to-ytmusic

      - name: Run sync
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          YT_COOKIE: ${{ secrets.YT_COOKIE }}
        run: |
          # 1. Aggiungiamo il percorso agli eseguibili
          export PATH=$PATH:/home/runner/.local/bin
          
          # 2. Setup automatico usando le variabili d'ambiente
          spotify_to_ytmusic setup --id "$SPOTIFY_CLIENT_ID" --secret "$SPOTIFY_CLIENT_SECRET" --cookie "$YT_COOKIE"
          
          # 3. Lanciamo la sincronizzazione usando 'me' come ID
          spotify_to_ytmusic all me
