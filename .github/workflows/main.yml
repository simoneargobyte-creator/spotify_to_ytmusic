name: Sync Spotify to YT Music
on:
  schedule:
    - cron: '0 * * * *' # Gira ogni ora
  workflow_dispatch: # Avvio manuale

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tool
        run: pip install spotify2ytmusic

      - name: Sync Liked Songs
        run: |
          # Aggiungiamo il percorso dove Python installa gli strumenti
          export PATH="$PATH:$HOME/.local/bin"
          
          # Setup delle credenziali Spotify
          spotify2ytmusic setup --id "${{ secrets.SPOTIFY_CLIENT_ID }}" --secret "${{ secrets.SPOTIFY_CLIENT_SECRET }}"
          
          # Creazione del file per YouTube Music
          echo '${{ secrets.YT_COOKIE }}' > headers.json
          
          # Sincronizza i "Mi piace"
          spotify2ytmusic liked
          
          # Sincronizza le playlist
          spotify2ytmusic playlists
